<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Shower - Bienvenida</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400&family=Pacifico&family=Satisfy&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <!-- Abejitas decorativas -->
    <div class="bee bee1">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="50" cy="50" rx="25" ry="15" fill="#c9a84c" />
            <rect x="35" y="45" width="30" height="3" fill="#8B4513" />
            <rect x="35" y="52" width="30" height="3" fill="#8B4513" />
            <ellipse cx="30" cy="40" rx="8" ry="15" fill="rgba(255,255,255,0.7)" />
            <ellipse cx="70" cy="40" rx="8" ry="15" fill="rgba(255,255,255,0.7)" />
        </svg>
    </div>

    <div class="bee bee2">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="50" cy="50" rx="25" ry="15" fill="#c9a84c" />
            <rect x="35" y="45" width="30" height="3" fill="#8B4513" />
            <rect x="35" y="52" width="30" height="3" fill="#8B4513" />
            <ellipse cx="30" cy="40" rx="8" ry="15" fill="rgba(255,255,255,0.7)" />
            <ellipse cx="70" cy="40" rx="8" ry="15" fill="rgba(255,255,255,0.7)" />
        </svg>
    </div>

    <!-- Panales decorativos -->
    <div class="honeycomb honeycomb-left">
        <svg width="60" height="60" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <polygon points="50,5 85,25 85,65 50,85 15,65 15,25" fill="none" stroke="#c9a84c" stroke-width="2"
                opacity="0.5" />
            <polygon points="50,15 75,30 75,60 50,75 25,60 25,30" fill="none" stroke="#e2c97e" stroke-width="1"
                opacity="0.7" />
        </svg>
    </div>

    <div class="honeycomb honeycomb-right">
        <svg width="60" height="60" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <polygon points="50,5 85,25 85,65 50,85 15,65 15,25" fill="none" stroke="#c9a84c" stroke-width="2"
                opacity="0.5" />
            <polygon points="50,15 75,30 75,60 50,75 25,60 25,30" fill="none" stroke="#e2c97e" stroke-width="1"
                opacity="0.7" />
        </svg>
    </div>

    <div class="welcome-container">
        <div class="welcome-text">Bienvenidos al</div>
        <div class="baby-shower-text">
            Baby Shower de
        </div>
        <!-- EDITABLE: Cambiar el nombre del bebé aquí -->
        <div class="name">Emyan</div>
        <!-- EDITABLE: Cambiar los nombres de los padres aquí -->
        <div class="invitation-text">Ana y Emanuel te invitan a celebrar</div>

        <div class="pooh-container" onclick="startTransition()">
            <img src="pooh2_clean.png" alt="Winnie Pooh con globos" class="pooh-image" id="poohImage">
        </div>

        <div class="click-text">Toca el globo para entrar</div>
    </div>

    <script src="index.js"></script>
</body>

</html>
